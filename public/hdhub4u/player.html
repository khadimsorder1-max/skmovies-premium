<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HDHub4u+ Player — Ad-free</title>
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">

<!-- Player libraries — lazy-loaded -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video-js.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@videojs/http-streaming@3.5.0/dist/vjs-http-streaming.min.css">
<script>
const _libCache = {};
function _loadLib(name, url) {
  if (_libCache[name]) return _libCache[name];
  if (window[name]) { _libCache[name] = Promise.resolve(); return _libCache[name]; }
  _libCache[name] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url; s.onload = resolve; s.onerror = () => reject(new Error('Failed to load ' + name));
    document.head.appendChild(s);
  });
  return _libCache[name];
}
function loadVideojs() { return _loadLib('videojs', 'https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video.min.js'); }
function loadHls() { return _loadLib('Hls', 'https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js'); }
function loadClappr() { return _loadLib('Clappr', 'https://cdn.jsdelivr.net/npm/clappr@0.4.6/dist/clappr.min.js'); }
</script>

<style>
  :root {
    --hd-bg: #000; --hd-text: #fff; --hd-accent: #ffdd95;
    --hd-bg-2: #1a1a1f; --hd-bg-3: #2a2a34; --hd-border: #2e2e38; --hd-text-dim: #9a9aa4;
    --hd-danger: #ff4d4d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; background: var(--hd-bg); color: var(--hd-text);
    font-family: 'Inter', -apple-system, system-ui, sans-serif; overflow: hidden;
  }

  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  
  /* Topbar */
  .topbar {
    flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.7));
    border-bottom: 1px solid var(--hd-border); z-index: 20; transition: opacity .3s, transform .3s;
  }
  .topbar.hidden { opacity: 0; transform: translateY(-100%); pointer-events: none; }
  .topbar .back-btn {
    background: transparent; color: var(--hd-text); border: 0; cursor: pointer;
    font-size: 22px; line-height: 1; padding: 6px 8px; border-radius: 8px; transition: background .15s;
  }
  .topbar .back-btn:hover { background: var(--hd-bg-3); }
  .topbar .title {
    flex: 1; min-width: 0; font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar .ext-group { display: flex; gap: 4px; flex-wrap: nowrap; }
  .topbar a, .topbar button {
    background: var(--hd-bg-3); color: var(--hd-text); border: 1px solid var(--hd-border);
    padding: 6px 10px; border-radius: 14px; font-size: 11px; font-weight: 600;
    text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
    transition: all .15s; white-space: nowrap;
  }
  .topbar a:hover, .topbar button:hover { background: var(--hd-bg-2); border-color: var(--hd-accent); color: var(--hd-accent); }
  .topbar a.mx { background: rgba(255,221,149,.1); color: var(--hd-accent); border-color: rgba(255,221,149,.4); }
  .topbar a.vlc { background: rgba(255,140,66,.1); color: #ff8c42; border-color: rgba(255,140,66,.4); }
  .topbar a.km { background: rgba(93,173,226,.1); color: #5dade2; border-color: rgba(93,173,226,.4); }
  
  /* Engine Switcher */
  .engine-select {
    background: rgba(255,221,149,.1); color: var(--hd-accent);
    border: 1px solid rgba(255,221,149,.4); padding: 6px 10px; border-radius: 14px;
    font-size: 11px; font-weight: 600; cursor: pointer; appearance: none; outline: none;
  }
  .engine-select:focus { border-color: var(--hd-accent); }

  /* In-player controls */
  .player-ctrls {
    display: inline-flex; align-items: center; gap: 10px; padding: 4px 6px; border-radius: 999px;
    background: rgba(0,0,0,.45); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.08);
  }
  .player-ctrls .ctrl { display: inline-flex; align-items: center; gap: 6px; color: var(--hd-text-dim); font-size: 12px; }
  .player-ctrls .ctrl svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .85; }
  .player-ctrls input[type=range] { width: 90px; accent-color: var(--hd-accent); cursor: pointer; height: 16px; }
  .player-ctrls select.ctrl-sel {
    background: rgba(255,255,255,.08); color: #fff; border: 1px solid var(--hd-border); border-radius: 6px;
    padding: 5px 8px; font-size: 12px; max-width: 140px; cursor: pointer; appearance: none;
    padding-right: 22px;
  }

  .stage { flex: 1; position: relative; background: #000; overflow: hidden; min-height: 0; }
  .video-js, .player-clappr { width: 100% !important; height: 100% !important; }
  .video-js { font-size: 13px; }
  .video-js .vjs-big-play-button {
    background: var(--hd-accent); color: #000; border: 0; border-radius: 50%;
    width: 72px; height: 72px; line-height: 72px; font-size: 32px;
    top: 50%; left: 50%; margin-top: -36px; margin-left: -36px;
  }
  .video-js .vjs-big-play-button:hover { background: #ffd166; }
  .stage iframe { width: 100%; height: 100%; border: 0; display: block; background: #000; }

  /* Error state */
  .err-state {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; padding: 24px; text-align: center; background: rgba(0,0,0,0.9); color: var(--hd-text-dim); z-index: 15;
  }
  .err-state .icon { font-size: 56px; }
  .err-state h2 { font-size: 18px; color: var(--hd-danger); }
  .err-state p { font-size: 13px; max-width: 480px; line-height: 1.5; color: #fff; }
  .err-state .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
  .err-state .actions button, .err-state .actions a {
    background: var(--hd-accent); color: #000; border: 0; cursor: pointer;
    padding: 10px 18px; border-radius: 22px; font-size: 13px; font-weight: 600; text-decoration: none;
  }
  .err-state .actions button.secondary, .err-state .actions a.secondary {
    background: var(--hd-bg-3); color: var(--hd-text); border: 1px solid var(--hd-border);
  }

  /* Loading state */
  .loading-state {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #000; color: var(--hd-text-dim); flex-direction: column; gap: 14px; z-index: 10;
  }
  .spinner {
    width: 38px; height: 38px; border: 3px solid rgba(255,221,149,.15);
    border-top-color: var(--hd-accent); border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .topbar { padding: 8px 10px; gap: 6px; flex-wrap: wrap; }
    .topbar .title { font-size: 13px; flex-basis: 100%; order: -1; padding-bottom: 6px; }
    .topbar a, .topbar button { padding: 5px 8px; font-size: 10px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar" id="topbar">
    <button class="back-btn" onclick="history.length > 1 ? history.back() : location.replace('/hdhub4u/')" aria-label="Back">←</button>
    <span class="title" id="title">Loading…</span>
    
    <div class="ext-group" id="ext-group">
      <select class="engine-select" id="engineSelect" title="Switch Player Engine" onchange="switchEngine(this.value)">
        <option value="auto">Auto Engine</option>
        <option value="native">Native (HTML5)</option>
        <option value="hlsjs">HLS.js</option>
        <option value="videojs">Video.js</option>
        <option value="clappr">Clappr</option>
        <option value="iframe">Iframe (Browser)</option>
      </select>
      <a class="mx"  id="mx-btn"  href="#" style="display:none" title="Open in MX Player">▶ MX</a>
      <a class="vlc" id="vlc-btn" href="#" style="display:none" title="Open in VLC">▶ VLC</a>
      <a class="km"  id="km-btn"  href="#" style="display:none" title="Open in KMPlayer">▶ KM</a>
      <a id="ext-btn" href="#" target="_blank" rel="noopener noreferrer" style="display:none" title="Open raw URL">↗ Open</a>
    </div>

    <!-- Brightness / Audio / Quality -->
    <div class="player-ctrls" id="playerCtrls" style="display:none">
      <label class="ctrl" title="Brightness">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M9 21h6v-1H9v1zm3-19a7 7 0 0 0-7 7c0 2.4 1.2 4.5 3 5.7V15a1 1 0 0 0 1-1 1H9a1 1 0 0 0 1-1-1V9.7C6.2 8.5 5 6.4 5 4a7 7 0 0 0 7-7z"/></svg>
        <input type="range" id="brightRange" min="0.3" max="1.5" step="0.05" value="1" />
      </label>
      <label class="ctrl" title="Audio Track" style="display:none" id="audioCtrl">
        <select id="audioSel" class="ctrl-sel"></select>
      </label>
      <label class="ctrl" title="Quality" style="display:none" id="qualityCtrl">
        <select id="qualitySel" class="ctrl-sel"></select>
      </label>
    </div>
  </div>
  
  <div class="stage" id="stage">
    <div class="loading-state" id="loading">
      <div class="spinner"></div>
      <p>Resolving stream…</p>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  const params = new URLSearchParams(location.search);
  const rawUrl = params.get('url') || '';
  const title  = params.get('title') || 'HDPlayer';
  const poster = params.get('poster') || '';
  let currentEngine = params.get('engine') || 'auto';
  let resolvedUrl = '';
  
  document.getElementById('title').textContent = decodeURIComponent(title);
  if(currentEngine !== 'auto') {
    const sel = document.getElementById('engineSelect');
    if(sel) sel.value = currentEngine;
  }

  // --- Auto hide topbar ---
  let topbarTimer;
  function showTopbar() {
    const bar = document.getElementById('topbar');
    bar.classList.remove('hidden');
    clearTimeout(topbarTimer);
    topbarTimer = setTimeout(() => bar.classList.add('hidden'), 3500);
  }
  document.addEventListener('mousemove', showTopbar);
  document.addEventListener('touchstart', showTopbar);
  document.addEventListener('click', showTopbar);
  showTopbar();

  // --- Helpers ---
  function isHls(u) { return /\.m3u[8]?(\?|$)/i.test(u); }
  function isMkv(u) { return /\.mkv(\?|$)/i.test(u); }
  function proxyUrl(u) { return '/api/hdhub4u/proxy?url=' + encodeURIComponent(u); }

  function setExtBtn(id, href) {
    const el = document.getElementById(id);
    if (el && href) { el.href = href; el.style.display = 'inline-flex'; }
  }

  function wireExtBtns(directUrl) {
    try {
      const u = new URL(directUrl);
      setExtBtn('mx-btn', 'intent://' + u.host + u.pathname + u.search + '#Intent;package=com.mxtech.videoplayer.ad;S.title=' + encodeURIComponent(decodeURIComponent(title)) + ';end');
      setExtBtn('km-btn', 'intent://' + u.host + u.pathname + u.search + '#Intent;package=com.kmplayer;S.title=' + encodeURIComponent(decodeURIComponent(title)) + ';end');
    } catch (_) {}
    setExtBtn('vlc-btn', 'vlc://' + directUrl);
    setExtBtn('ext-btn', directUrl);
  }

  function showLoading(msg) {
    document.getElementById('stage').innerHTML = `<div class="loading-state"><div class="spinner"></div><p>${esc(msg || 'Loading...')}</p></div>`;
  }

  function showError(msg, details) {
    const nextEngine = getNextEngine(currentEngine);
    document.getElementById('stage').innerHTML = `
      <div class="err-state">
        <div class="icon">⚠️</div>
        <h2>Playback Error</h2>
        <p>${esc(msg)} <br/> <small style="opacity:0.7">${esc(details)}</small></p>
        <div class="actions">
          <button onclick="switchEngine('${nextEngine}')">Try Engine: ${nextEngine.toUpperCase()}</button>
          <a class="secondary" href="vlc://${resolvedUrl}">▶ Open in VLC</a>
          <a class="secondary" href="${resolvedUrl}" target="_blank">↗ Raw URL</a>
        </div>
      </div>
    `;
  }

  function getNextEngine(curr) {
    const order = ['native', 'hlsjs', 'videojs', 'clappr', 'iframe'];
    if(curr === 'auto') curr = determineBestEngine(resolvedUrl);
    const idx = order.indexOf(curr);
    return order[(idx + 1) % order.length];
  }

  window.switchEngine = function(engine) {
    if(engine === currentEngine && engine !== 'auto') return;
    currentEngine = engine;
    document.getElementById('engineSelect').value = engine;
    const pu = new URL(location.href);
    pu.searchParams.set('engine', engine);
    history.replaceState(null, '', pu.toString());
    cleanupPlayer();
    if(resolvedUrl) startPlayback(resolvedUrl, engine);
  };

  function cleanupPlayer() {
    try { if (window._hls) window._hls.destroy(); } catch (_) {}
    try { if (window._vjsPlayer) window._vjsPlayer.dispose(); } catch (_) {}
    try { if (window._clappr) window._clappr.destroy(); } catch (_) {}
    window._hls = null; window._vjsPlayer = null; window._clappr = null;
    document.getElementById('stage').innerHTML = '';
  }

  // --- Core Logic ---
  async function boot() {
    if(!rawUrl) return showError('No URL provided', 'Missing ?url= parameter');
    wireExtBtns(rawUrl);
    
    // Auto resolve embed URLs
    if(/hubstream\.art|hdstream4u\.com|hdhub\.boats|hubcloud|filepress/i.test(rawUrl)) {
      showLoading('Resolving Direct Link...');
      try {
        const r = await fetch('/api/hdhubmain/stream?url=' + encodeURIComponent(rawUrl) + '&mode=direct');
        const j = await r.json();
        resolvedUrl = j.directUrl || j.streamUrl || j.externalUrl;
        if(j.iframe && !resolvedUrl) resolvedUrl = j.iframe;
      } catch(e) {
        resolvedUrl = rawUrl;
      }
    } else {
      resolvedUrl = rawUrl;
    }
    
    wireExtBtns(resolvedUrl);
    startPlayback(resolvedUrl, currentEngine);
  }

  function determineBestEngine(u) {
    if (isHls(u)) return 'hlsjs';
    if (isMkv(u)) return 'clappr';
    return 'native';
  }

  function getProxyUrl(u) {
    return u.startsWith(location.origin) ? u : proxyUrl(u);
  }

  async function startPlayback(url, engine) {
    if (engine === 'auto') engine = determineBestEngine(url);
    console.log(`Starting playback with engine: ${engine}`);

    if (engine === 'iframe') {
      showLoading('Loading Iframe...');
      document.getElementById('stage').innerHTML = `<iframe src="${esc(url)}" allow="autoplay; fullscreen" sandbox="allow-scripts allow-presentation allow-same-origin"></iframe>`;
      return;
    }

    if (engine === 'native') return playNative(url);
    if (engine === 'hlsjs') return playHlsJs(url);
    if (engine === 'videojs') return playVideoJs(url);
    if (engine === 'clappr') return playClappr(url);
  }

  // --- Engines ---
  function createVideoEl() {
    document.getElementById('stage').innerHTML = '';
    const v = document.createElement('video');
    v.controls = true; v.playsInline = true;
    v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
    if (poster) v.poster = poster;
    v.style.cssText = 'width:100%;height:100%;object-fit:contain;background:#000;display:block';
    document.getElementById('stage').appendChild(v);
    return v;
  }

  function playNative(url) {
    showLoading('Starting Native Engine...');
    const v = createVideoEl();
    v.src = getProxyUrl(url);
    v.addEventListener('error', () => showError('Native Player Failed', 'Format might not be supported. Switch engine.'));
    v.addEventListener('loadedmetadata', () => { v.play().catch(()=>{}); wireCtrls(v); });
  }

  async function playHlsJs(url) {
    showLoading('Starting HLS.js...');
    try { await loadHls(); } catch(e) { return playNative(url); }
    if (!Hls.isSupported()) return playNative(url);
    
    const v = createVideoEl();
    const hls = new Hls({ enableWorker: true });
    hls.loadSource(getProxyUrl(url));
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { v.play().catch(()=>{}); wireCtrls(v); });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) showError('HLS.js Error', `Type: ${data.type}`);
    });
    window._hls = hls;
  }

  async function playVideoJs(url) {
    showLoading('Starting Video.js...');
    try { await loadVideojs(); } catch(e) { return playNative(url); }
    const stage = document.getElementById('stage');
    stage.innerHTML = '<video id="vjs-el" class="video-js vjs-default-skin vjs-big-play-centered" controls playsinline></video>';
    const v = document.getElementById('vjs-el');
    if (poster) v.setAttribute('poster', poster);
    
    const player = videojs(v, {
      fluid: true, responsive: true, playbackRates: [0.5, 1, 1.25, 1.5, 2],
      html5: { vhs: { overrideNative: true } }
    });
    player.src({ src: getProxyUrl(url), type: isHls(url) ? 'application/x-mpegURL' : 'video/mp4' });
    player.ready(() => { player.play().catch(()=>{}); });
    player.on('error', () => showError('Video.js Error', 'Playback failed.'));
    window._vjsPlayer = player;
  }

  async function playClappr(url) {
    showLoading('Starting Clappr...');
    try { await loadClappr(); } catch(e) { return playNative(url); }
    document.getElementById('stage').innerHTML = '<div id="player-clappr"></div>';
    try {
      const player = new Clappr.Player({
        source: getProxyUrl(url), parentId: '#player-clappr',
        height: '100%', width: '100%', autoPlay: true, poster: poster || '',
        mimeType: isMkv(url) ? 'video/x-matroska' : undefined,
        events: { onError: (e) => showError('Clappr Error', 'Unsupported codec.') }
      });
      window._clappr = player;
    } catch(e) { playNative(url); }
  }

  // --- UI Controls ---
  function wireCtrls(video) {
    document.getElementById('playerCtrls').style.display = 'inline-flex';
    const br = document.getElementById('brightRange');
    if(br) { br.oninput = () => video.style.filter = br.value === '1' ? '' : `brightness(${br.value})`; }
  }

  document.addEventListener('keydown', (e) => {
    if(e.target.tagName === 'INPUT') return;
    const v = document.querySelector('video');
    if(!v) return;
    switch(e.key) {
      case ' ': e.preventDefault(); v.paused ? v.play() : v.pause(); break;
      case 'ArrowRight': v.currentTime += 10; break;
      case 'ArrowLeft': v.currentTime -= 10; break;
      case 'f': document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen(); break;
    }
  });

  window.addEventListener('beforeunload', cleanupPlayer);
  
  boot();
})();
</script>
</body>
</html>
