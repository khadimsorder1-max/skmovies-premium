<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HDPlayer Pro — Premium Video Player</title>
<meta name="robots" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">

<!-- Player libraries — lazy-loaded -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/video.js@8.23.8/dist/video-js.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<script>
const _libCache = {};
function _loadLib(name, url) {
  if (_libCache[name]) return _libCache[name];
  if (window[name]) { _libCache[name] = Promise.resolve(); return _libCache[name]; }
  _libCache[name] = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = url; s.onload = resolve; s.onerror = () => reject(new Error('Failed to load ' + name));
    document.head.appendChild(s);
  });
  return _libCache[name];
}
function loadVideojs() { return _loadLib('videojs', 'https://cdn.jsdelivr.net/npm/video.js@8.23.8/dist/video.min.js'); }
function loadHls() { return _loadLib('Hls', 'https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js'); }
function loadClappr() { return _loadLib('Clappr', 'https://cdn.jsdelivr.net/npm/clappr@0.4.6/dist/clappr.min.js'); }
</script>

<style>
  /* ══════════════════════════════════════════
     SKIPTV v3.0 PRO DESIGN SYSTEM (DARK THEME)
     ══════════════════════════════════════════ */
  :root {
    --bg-base: #0D1117;
    --bg-surface: #161B22;
    --bg-card: #1C2128;
    --border-color: #2A313C;
    --primary-color: #3D8EF0;
    --primary-hover: #5da0f4;
    --accent-glow: rgba(61, 142, 240, 0.35);
    --success-color: #22C55E;
    --danger-color: #EF4444;
    --text-primary: #F5F7FA;
    --text-secondary: #AAB4C0;
    --text-muted: #57606A;
    --font-primary: 'Inter', -apple-system, system-ui, sans-serif;
    --font-brand: 'Sora', sans-serif;
    --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  html, body {
    width: 100%; height: 100%; background: var(--bg-base); color: var(--text-primary);
    font-family: var(--font-primary); overflow: hidden; overscroll-behavior: none;
  }

  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; width: 100vw; position: relative; overflow: hidden; }

  /* ═══ TOPBAR ═══ */
  .topbar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 10px 16px; background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-color); z-index: 50;
    transition: transform 0.3s var(--ease-out-expo), opacity 0.3s var(--ease-out-expo);
  }
  .topbar.hidden { opacity: 0; transform: translateY(-100%); pointer-events: none; }

  .topbar-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
  
  .back-btn {
    background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color);
    width: 36px; height: 36px; border-radius: 10px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 16px; font-weight: 700;
    transition: all 0.15s ease; flex-shrink: 0;
  }
  .back-btn:hover { background: var(--border-color); border-color: var(--primary-color); color: var(--primary-color); }

  .title-group { display: flex; flex-direction: column; min-width: 0; }
  .title-group .live-tag {
    display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 800;
    color: var(--primary-color); letter-spacing: 0.5px; text-transform: uppercase;
  }
  .title-group .live-tag::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--primary-color);
    box-shadow: 0 0 8px var(--primary-color); animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .title {
    font-family: var(--font-brand); font-size: 14px; font-weight: 700; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px;
  }

  .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* Engine Selector Dropdown */
  .engine-select {
    background: var(--bg-card); color: var(--primary-color); border: 1px solid var(--border-color);
    padding: 7px 12px; border-radius: 10px; font-size: 11px; font-weight: 700;
    cursor: pointer; outline: none; transition: all 0.15s ease; font-family: var(--font-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .engine-select:hover, .engine-select:focus { border-color: var(--primary-color); box-shadow: 0 0 12px var(--accent-glow); }

  /* External Launchers */
  .ext-btn {
    background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color);
    padding: 7px 12px; border-radius: 10px; font-size: 11px; font-weight: 700;
    text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
    transition: all 0.15s ease; white-space: nowrap;
  }
  .ext-btn:hover { background: var(--border-color); border-color: var(--primary-color); color: var(--primary-color); }
  .ext-btn.mx { color: #60A5FA; border-color: rgba(96, 165, 250, 0.3); background: rgba(96, 165, 250, 0.08); }
  .ext-btn.vlc { color: #F97316; border-color: rgba(249, 115, 22, 0.3); background: rgba(249, 115, 22, 0.08); }
  .ext-btn.km { color: #A855F7; border-color: rgba(168, 85, 247, 0.3); background: rgba(168, 85, 247, 0.08); }

  /* Controls Overlay */
  .ctrl-bar {
    display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px; border-radius: 12px;
    background: var(--bg-surface); border: 1px solid var(--border-color);
  }
  .ctrl-item { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 11px; font-weight: 600; }
  .ctrl-item input[type=range] { width: 75px; accent-color: var(--primary-color); cursor: pointer; height: 4px; }
  .ctrl-item select {
    background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color);
    border-radius: 6px; padding: 4px 6px; font-size: 11px; font-weight: 600; cursor: pointer;
  }

  /* ═══ STAGE ═══ */
  .stage { flex: 1; position: relative; background: #000; overflow: hidden; min-height: 0; }
  .video-js, .player-clappr { width: 100% !important; height: 100% !important; }
  .video-js { font-size: 13px; }
  .video-js .vjs-big-play-button {
    background: var(--primary-color); color: #fff; border: 0; border-radius: 50%;
    width: 68px; height: 68px; line-height: 68px; font-size: 28px;
    top: 50%; left: 50%; margin-top: -34px; margin-left: -34px;
    box-shadow: 0 0 24px var(--accent-glow); transition: transform 0.2s var(--ease-spring);
  }
  .video-js .vjs-big-play-button:hover { transform: scale(1.1); background: var(--primary-hover); }
  .stage iframe { width: 100%; height: 100%; border: 0; display: block; background: #000; }

  /* ═══ LOADING & ERROR STATES ═══ */
  .state-layer {
    position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px; text-align: center; background: var(--bg-base); color: var(--text-secondary); z-index: 20;
  }
  .spinner {
    width: 44px; height: 44px; border: 3.5px solid var(--border-color);
    border-top-color: var(--primary-color); border-radius: 50%; animation: spin 0.8s linear infinite;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .err-box {
    background: var(--bg-surface); border: 1px solid var(--border-color); padding: 28px; border-radius: 20px;
    max-width: 480px; width: 100%; box-shadow: 0 12px 32px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .err-box .err-icon { font-size: 44px; }
  .err-box h2 { font-family: var(--font-brand); font-size: 18px; font-weight: 800; color: var(--danger-color); }
  .err-box p { font-size: 13px; line-height: 1.5; color: var(--text-primary); }
  .err-box .err-details { font-size: 11px; color: var(--text-muted); word-break: break-all; }
  .err-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; width: 100%; }
  .err-actions button, .err-actions a {
    background: var(--primary-color); color: #fff; border: 0; cursor: pointer;
    padding: 10px 18px; border-radius: 12px; font-size: 12px; font-weight: 700; text-decoration: none;
    transition: all 0.15s ease; flex: 1; min-width: 120px; text-align: center;
  }
  .err-actions button:hover, .err-actions a:hover { background: var(--primary-hover); box-shadow: 0 0 14px var(--accent-glow); }
  .err-actions .secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); }
  .err-actions .secondary:hover { border-color: var(--primary-color); color: var(--primary-color); }

  @media (max-width: 640px) {
    .topbar { padding: 8px 12px; gap: 6px; flex-wrap: wrap; }
    .title { max-width: 200px; font-size: 13px; }
    .ext-btn { padding: 5px 8px; font-size: 10px; }
    .engine-select { padding: 5px 8px; font-size: 10px; }
    .ctrl-bar { display: none !important; }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Topbar -->
  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="history.length > 1 ? history.back() : location.replace('/')" aria-label="Back">←</button>
      <div class="title-group">
        <span class="live-tag">HDPlayer Pro</span>
        <span class="title" id="title">Loading Stream…</span>
      </div>
    </div>
    
    <div class="topbar-right">
      <!-- Engine Selector -->
      <select class="engine-select" id="engineSelect" title="Switch Player Engine" onchange="switchEngine(this.value)">
        <option value="auto">⚡ Auto Engine</option>
        <option value="native">🌐 Native (HTML5)</option>
        <option value="hlsjs">🚀 HLS.js</option>
        <option value="videojs">🎬 Video.js</option>
        <option value="clappr">📼 Clappr</option>
        <option value="iframe">🖼️ Iframe (Browser)</option>
      </select>

      <!-- External Launchers -->
      <a class="ext-btn mx"  id="mx-btn"  href="#" style="display:none" title="Open in MX Player">▶ MX</a>
      <a class="ext-btn vlc" id="vlc-btn" href="#" style="display:none" title="Open in VLC">▶ VLC</a>
      <a class="ext-btn km"  id="km-btn"  href="#" style="display:none" title="Open in KMPlayer">▶ KM</a>
      <a class="ext-btn"     id="ext-btn" href="#" target="_blank" rel="noopener noreferrer" style="display:none" title="Open raw URL">↗ Open</a>

      <!-- Brightness / Aspect Ratio controls -->
      <div class="ctrl-bar" id="ctrlBar">
        <label class="ctrl-item" title="Brightness">
          ☀️ <input type="range" id="brightRange" min="0.3" max="1.5" step="0.05" value="1" />
        </label>
        <label class="ctrl-item" title="Aspect Ratio">
          📐
          <select id="fitSel" onchange="changeFit(this.value)">
            <option value="contain">Fit</option>
            <option value="cover">Cover</option>
            <option value="fill">Fill</option>
          </select>
        </label>
      </div>
    </div>
  </div>
  
  <!-- Video Stage -->
  <div class="stage" id="stage" dblclick="toggleFullscreen()">
    <div class="state-layer" id="loading">
      <div class="spinner"></div>
      <p style="font-family:var(--font-brand);font-weight:700;color:var(--text-primary);">Resolving Direct Stream…</p>
      <small style="font-size:11px;color:var(--text-muted)">Connecting to high-speed CDN</small>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  const params = new URLSearchParams(location.search);
  const rawUrl = params.get('url') || '';
  const title  = params.get('title') || 'HDPlayer Pro';
  const poster = params.get('poster') || '';
  let currentEngine = params.get('engine') || 'auto';
  let resolvedUrl = '';
  
  document.getElementById('title').textContent = decodeURIComponent(title);
  if(currentEngine !== 'auto') {
    const sel = document.getElementById('engineSelect');
    if(sel) sel.value = currentEngine;
  }

  // --- Auto hide topbar ---
  let topbarTimer;
  function showTopbar() {
    const bar = document.getElementById('topbar');
    if (!bar) return;
    bar.classList.remove('hidden');
    clearTimeout(topbarTimer);
    topbarTimer = setTimeout(() => bar.classList.add('hidden'), 3500);
  }
  document.addEventListener('mousemove', showTopbar);
  document.addEventListener('touchstart', showTopbar);
  document.addEventListener('click', showTopbar);
  showTopbar();

  // --- Helpers ---
  function isHls(u) { return /\.m3u[8]?(\?|$)/i.test(u); }
  function isMkv(u) { return /\.mkv(\?|$)/i.test(u); }
  function proxyUrl(u) { return '/api/hdhub4u/proxy?url=' + encodeURIComponent(u); }

  function setExtBtn(id, href) {
    const el = document.getElementById(id);
    if (el && href) { el.href = href; el.style.display = 'inline-flex'; }
  }

  function wireExtBtns(directUrl) {
    try {
      const u = new URL(directUrl);
      setExtBtn('mx-btn', 'intent://' + u.host + u.pathname + u.search + '#Intent;package=com.mxtech.videoplayer.ad;S.title=' + encodeURIComponent(decodeURIComponent(title)) + ';end');
      setExtBtn('km-btn', 'intent://' + u.host + u.pathname + u.search + '#Intent;package=com.kmplayer;S.title=' + encodeURIComponent(decodeURIComponent(title)) + ';end');
    } catch (_) {}
    setExtBtn('vlc-btn', 'vlc://' + directUrl);
    setExtBtn('ext-btn', directUrl);
  }

  function showLoading(msg) {
    document.getElementById('stage').innerHTML = `
      <div class="state-layer">
        <div class="spinner"></div>
        <p style="font-family:var(--font-brand);font-weight:700;color:var(--text-primary);">${esc(msg || 'Loading...')}</p>
      </div>`;
  }

  function showError(msg, details) {
    const nextEngine = getNextEngine(currentEngine);
    document.getElementById('stage').innerHTML = `
      <div class="state-layer">
        <div class="err-box">
          <div class="err-icon">⚠️</div>
          <h2>Playback Alert</h2>
          <p>${esc(msg)}</p>
          <div class="err-details">${esc(details)}</div>
          <div class="err-actions">
            <button onclick="switchEngine('${nextEngine}')">⚡ Switch Engine: ${nextEngine.toUpperCase()}</button>
            <a class="secondary" href="vlc://${resolvedUrl}">▶ Open in VLC</a>
            <a class="secondary" href="${resolvedUrl}" target="_blank">↗ Raw Stream</a>
          </div>
        </div>
      </div>
    `;
  }

  function getNextEngine(curr) {
    const order = ['native', 'hlsjs', 'videojs', 'clappr', 'iframe'];
    if(curr === 'auto') curr = determineBestEngine(resolvedUrl);
    const idx = order.indexOf(curr);
    return order[(idx + 1) % order.length];
  }

  window.switchEngine = function(engine) {
    if(engine === currentEngine && engine !== 'auto') return;
    currentEngine = engine;
    document.getElementById('engineSelect').value = engine;
    const pu = new URL(location.href);
    pu.searchParams.set('engine', engine);
    history.replaceState(null, '', pu.toString());
    cleanupPlayer();
    if(resolvedUrl) startPlayback(resolvedUrl, engine);
  };

  window.changeFit = function(mode) {
    const v = document.querySelector('video');
    if (v) v.style.objectFit = mode;
  };

  window.toggleFullscreen = function() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  };

  function cleanupPlayer() {
    try { if (window._hls) window._hls.destroy(); } catch (_) {}
    try { if (window._vjsPlayer) window._vjsPlayer.dispose(); } catch (_) {}
    try { if (window._clappr) window._clappr.destroy(); } catch (_) {}
    window._hls = null; window._vjsPlayer = null; window._clappr = null;
    document.getElementById('stage').innerHTML = '';
  }

  // --- Core Logic ---
  async function boot() {
    if(!rawUrl) return showError('No URL provided', 'Missing ?url= parameter');
    wireExtBtns(rawUrl);
    
    // Auto resolve embed URLs
    if(/hubstream\.art|hdstream4u\.com|hdhub\.boats|hubcloud|filepress/i.test(rawUrl)) {
      showLoading('Resolving Direct Stream...');
      try {
        const r = await fetch('/api/hdhubmain/stream?url=' + encodeURIComponent(rawUrl) + '&mode=direct');
        const j = await r.json();
        resolvedUrl = j.directUrl || j.streamUrl || j.externalUrl;
        if(j.iframe && !resolvedUrl) resolvedUrl = j.iframe;
      } catch(e) {
        resolvedUrl = rawUrl;
      }
    } else {
      resolvedUrl = rawUrl;
    }
    
    wireExtBtns(resolvedUrl);
    startPlayback(resolvedUrl, currentEngine);
  }

  function determineBestEngine(u) {
    if (isHls(u)) return 'hlsjs';
    if (isMkv(u)) return 'clappr';
    return 'native';
  }

  function getProxyUrl(u) {
    return u.startsWith(location.origin) ? u : proxyUrl(u);
  }

  async function startPlayback(url, engine) {
    if (engine === 'auto') engine = determineBestEngine(url);
    console.log(`Starting playback with engine: ${engine}`);

    if (engine === 'iframe') {
      showLoading('Loading Iframe Player...');
      document.getElementById('stage').innerHTML = `<iframe src="${esc(url)}" allow="autoplay; fullscreen" sandbox="allow-scripts allow-presentation allow-same-origin"></iframe>`;
      return;
    }

    if (engine === 'native') return playNative(url);
    if (engine === 'hlsjs') return playHlsJs(url);
    if (engine === 'videojs') return playVideoJs(url);
    if (engine === 'clappr') return playClappr(url);
  }

  // --- Engines ---
  function createVideoEl() {
    document.getElementById('stage').innerHTML = '';
    const v = document.createElement('video');
    v.controls = true; v.playsInline = true;
    v.setAttribute('playsinline', ''); v.setAttribute('webkit-playsinline', '');
    if (poster) v.poster = poster;
    v.style.cssText = 'width:100%;height:100%;object-fit:contain;background:#000;display:block';
    document.getElementById('stage').appendChild(v);
    return v;
  }

  function playNative(url) {
    showLoading('Starting Native Engine...');
    const v = createVideoEl();
    v.src = getProxyUrl(url);
    v.addEventListener('error', () => showError('Native Player Failed', 'Format might not be supported. Switch engine.'));
    v.addEventListener('loadedmetadata', () => { v.play().catch(()=>{}); wireCtrls(v); });
  }

  async function playHlsJs(url) {
    showLoading('Starting HLS.js Engine...');
    try { await loadHls(); } catch(e) { return playNative(url); }
    if (!Hls.isSupported()) return playNative(url);
    
    const v = createVideoEl();
    const hls = new Hls({ enableWorker: true });
    hls.loadSource(getProxyUrl(url));
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, () => { v.play().catch(()=>{}); wireCtrls(v); });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) showError('HLS.js Stream Error', `Type: ${data.type}`);
    });
    window._hls = hls;
  }

  async function playVideoJs(url) {
    showLoading('Starting Video.js Engine...');
    try { await loadVideojs(); } catch(e) { return playNative(url); }
    const stage = document.getElementById('stage');
    stage.innerHTML = '<video id="vjs-el" class="video-js vjs-default-skin vjs-big-play-centered" controls playsinline></video>';
    const v = document.getElementById('vjs-el');
    if (poster) v.setAttribute('poster', poster);
    
    const player = videojs(v, {
      fluid: true, responsive: true, playbackRates: [0.5, 1, 1.25, 1.5, 2],
      html5: { vhs: { overrideNative: true } }
    });
    player.src({ src: getProxyUrl(url), type: isHls(url) ? 'application/x-mpegURL' : 'video/mp4' });
    player.ready(() => { player.play().catch(()=>{}); });
    player.on('error', () => showError('Video.js Engine Error', 'Playback failed.'));
    window._vjsPlayer = player;
  }

  async function playClappr(url) {
    showLoading('Starting Clappr Engine...');
    try { await loadClappr(); } catch(e) { return playNative(url); }
    document.getElementById('stage').innerHTML = '<div id="player-clappr"></div>';
    try {
      const player = new Clappr.Player({
        source: getProxyUrl(url), parentId: '#player-clappr',
        height: '100%', width: '100%', autoPlay: true, poster: poster || '',
        mimeType: isMkv(url) ? 'video/x-matroska' : undefined,
        events: { onError: (e) => showError('Clappr Engine Error', 'Unsupported video codec.') }
      });
      window._clappr = player;
    } catch(e) { playNative(url); }
  }

  // --- UI Controls ---
  function wireCtrls(video) {
    const br = document.getElementById('brightRange');
    if(br) { br.oninput = () => video.style.filter = br.value === '1' ? '' : `brightness(${br.value})`; }
  }

  document.addEventListener('keydown', (e) => {
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    const v = document.querySelector('video');
    if(!v) return;
    switch(e.key) {
      case ' ': e.preventDefault(); v.paused ? v.play() : v.pause(); break;
      case 'ArrowRight': v.currentTime += 10; break;
      case 'ArrowLeft': v.currentTime -= 10; break;
      case 'f': toggleFullscreen(); break;
    }
  });

  window.addEventListener('beforeunload', cleanupPlayer);
  
  boot();
})();
</script>
</body>
</html>
